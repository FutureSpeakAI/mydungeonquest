<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MyDungeon.Quest — The Notary’s Desk</title><style>
:root{color-scheme:dark;font-family:Georgia,'Times New Roman',serif;background:#0d0b14;color:#e9dfc8}*{box-sizing:border-box}body{margin:0;padding:2.4rem 1rem;background:radial-gradient(60% 42% at 50% 0,rgba(212,162,78,.09),transparent 70%),#0d0b14}main{max-width:880px;margin:auto}.wax-mark{width:54px;height:54px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#a03a2e,#5f1f18 72%);box-shadow:0 2px 8px rgba(0,0,0,.6),inset 0 1px 4px rgba(255,255,255,.16);display:grid;place-items:center;color:#f3d9b0;font-size:1.25rem;margin-bottom:1rem}.desk-eyebrow{letter-spacing:.32em;font-size:.72rem;color:#d4a24e}h1{font-size:clamp(2rem,7vw,3.6rem);margin:.4rem 0 .2rem;color:#e9dfc8;font-weight:600}h1 b{color:#d4a24e;font-weight:600}p{line-height:1.55;color:#bfb39b;max-width:62ch}label{display:block;border:1px dashed #8e6b35;border-radius:16px;padding:2rem;text-align:center;background:linear-gradient(180deg,#1a141f,#141019);cursor:pointer;font-style:italic}label b{color:#d4a24e;font-style:normal}input{display:none}.summary,.record{margin-top:1rem;border:1px solid #342a3a;border-radius:12px;padding:1rem;background:#131018}.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:.5rem}.summary span{display:grid;color:#bfb39b}.summary b{font-size:1.2rem;color:#e9dfc8;font-variant-numeric:tabular-nums}.record{display:grid;grid-template-columns:55px 1fr auto;gap:.8rem;align-items:center}.record.ok{border-left:4px solid #547565}.record.bad{border-left:4px solid #9b4b46}.record code{font-size:.68rem;color:#9b8da3;word-break:break-all}.record b{font-variant-numeric:tabular-nums}.badge{border-radius:999px;padding:.3rem .55rem;font-size:.7rem}.ok .badge{background:#20362c;color:#acd0bd}.bad .badge{background:#452425;color:#e1a4a0}.timeline{margin-top:2rem}.empty{color:#746a78;text-align:center;padding:3rem;font-style:italic}</style></head><body><main><div class="wax-mark">✦</div><span class="desk-eyebrow">THE NOTARY’S DESK · OFFLINE</span><h1>Every turn, <b>answerable</b></h1><p>Lay a sealed chronicle on the desk. The notary recomputes every canonical record hash, follows the chain link by link, and asks the wax to answer for its signatures — without a whisper of network.</p><label>Present a <b>.chronicle.json</b> chronicle — the desk takes it from your hand<input id="file" type="file" accept=".json,.chronicle.json"></label><div id="out" class="empty">The desk is bare — no chronicle presented.</div></main><script>
const enc=new TextEncoder();
function canonicalize(v){if(v===null||typeof v!=='object')return JSON.stringify(v);if(Array.isArray(v))return`[${v.map(canonicalize).join(',')}]`;return`{${Object.keys(v).sort().map(k=>`${JSON.stringify(k)}:${canonicalize(v[k])}`).join(',')}}`}
function hex(b){return[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')}
function b64(v){const s=atob(v);return Uint8Array.from(s,c=>c.charCodeAt(0))}
async function digest(v){return hex(await crypto.subtle.digest('SHA-256',enc.encode(v)))}
async function verify(data){let prev=null,chain=true,hashes=true,sigs=true,sigChecked=false,pub=null;try{if(data.header.publicKeyJwk)pub=await crypto.subtle.importKey('jwk',data.header.publicKeyJwk,{name:'Ed25519'},false,['verify'])}catch{}
const rows=[];for(const r of data.journal||[]){const expected=await digest(canonicalize({type:r.type,i:r.i,prevHash:r.prevHash,payload:r.payload,ts:r.ts}));const hashOk=expected===r.recordHash;const chainOk=r.prevHash===prev;let sigOk=null;if(pub&&r.signature){sigChecked=true;try{sigOk=await crypto.subtle.verify({name:'Ed25519'},pub,b64(r.signature),enc.encode(r.recordHash))}catch{sigOk=false}}hashes&&=hashOk;chain&&=chainOk;if(sigOk===false)sigs=false;rows.push({r,hashOk,chainOk,sigOk});prev=r.recordHash}
const all=hashes&&chain&&sigs;document.getElementById('out').innerHTML=`<section class="summary"><span><b>${all?'GREEN':'RED'}</b>overall audit</span><span><b>${rows.length}</b>records</span><span><b>${chain?'intact':'broken'}</b>hash chain</span><span><b>${sigChecked?(sigs?'valid':'invalid'):'not exported'}</b>signatures</span></section><section class="timeline">${rows.map(({r,hashOk,chainOk,sigOk})=>{const ok=hashOk&&chainOk&&sigOk!==false;const title=r.type==='turn'?(r.payload.dm?.cinematic?.title||r.payload.player||'Turn'):r.type.replaceAll('_',' ');return`<article class="record ${ok?'ok':'bad'}"><b>#${r.i}</b><div><strong>${escapeHtml(title)}</strong><br><code>${r.recordHash}</code></div><span class="badge">${ok?'valid':'broken'}</span></article>`}).join('')}</section>`}
function escapeHtml(v){return String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
document.getElementById('file').addEventListener('change',async e=>{try{const data=JSON.parse(await e.target.files[0].text());if(data.header?.format!=='mydungeon.chronicle')throw new Error('Not a MyDungeon chronicle');await verify(data)}catch(err){document.getElementById('out').innerHTML=`<article class="record bad"><b>!</b><div>${escapeHtml(err.message)}</div><span class="badge">invalid file</span></article>`}})
</script></body></html>
